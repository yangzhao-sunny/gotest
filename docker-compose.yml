services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    entrypoint: ["/taskmgr-migrate", "up"]
    environment:
      TASKMGR_DB_DSN: postgres://app:secret@postgres:5432/appdb?sslmode=disable
      TASKMGR_JWT_SECRET: changeme-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      TASKMGR_DB_DSN: postgres://app:secret@postgres:5432/appdb?sslmode=disable
      TASKMGR_REDIS_ADDR: redis:6379
      TASKMGR_JWT_SECRET: changeme-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
